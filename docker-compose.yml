

services:
  redis:
    image: redis:7-alpine
    container_name: toefl_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: toefl_backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: toefl_frontend
    ports:
      - "5173:80" 
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
